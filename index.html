<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Servify – Entdecke Discord Server</title>
<meta name="description" content="Servify – finde und entdecke die besten Discord-Server. Trage deinen eigenen Server ein, sammle Bewertungen und wachse.">
<meta property="og:title" content="Servify – Entdecke Discord Server">
<meta property="og:description" content="Suche Discord-Server nach Name oder Hashtag und finde deine Community.">
<meta property="og:image" content="/logo.png">
<meta name="theme-color" content="#0e1626">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;overflow-x:hidden;}
  body{background:#0e1626;overflow-x:hidden;}
  img,video{max-width:100%;height:auto;}
  .root{--accent:#7c6fff;--accent2:#4ecdc4;--accentd:#4f3dc7;font-family:'DM Sans',sans-serif;background:#0e1626;color:#e8ecf6;min-height:100vh;overflow-x:hidden;}
  .root.reduce-motion *,.root.reduce-motion *::before,.root.reduce-motion *::after{animation:none!important;transition:none!important;}
  .root.no-atmos .sun-glow,.root.no-atmos .rainbow,.root.no-atmos .cloud{display:none!important;}
  .root.compact .scard{padding:14px;gap:9px;}
  .root.compact .sicon{width:48px;height:48px;font-size:24px;}
  .root.compact .server-grid{gap:14px;}

  .navbar{position:sticky;top:0;z-index:200;transition:background 0.25s,border-color 0.25s;}
  .navbar.nav-solid{background:rgba(14,22,38,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);}
  .navbar.nav-clear{background:transparent;border-bottom:1px solid transparent;}
  .nav-inner{max-width:1240px;margin:0 auto;padding:0 24px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .logo{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
  .logo-hex{width:34px;height:34px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px;color:#e8ecf6;letter-spacing:-0.4px;transition:color 0.25s;}
  .logo-text span{color:var(--accent);}
  .nav-clear .logo-text{color:#fff;text-shadow:0 2px 10px rgba(30,50,110,0.35);}
  .nav-clear .logo-text span{color:#fff;}
  .nav-links{display:flex;gap:2px;}
  .nav-link{color:#8995ad;padding:7px 14px;border-radius:9px;font-size:14px;font-weight:500;transition:all 0.18s;cursor:pointer;background:transparent;border:none;font-family:'DM Sans',sans-serif;}
  .nav-link:hover{color:#e8ecf6;background:rgba(255,255,255,0.055);}
  .nav-link.nl-on{color:#e8ecf6;background:rgba(255,255,255,0.08);}
  .nav-clear .nav-link{color:rgba(255,255,255,0.88);text-shadow:0 1px 6px rgba(30,50,110,0.3);}
  .nav-clear .nav-link:hover,.nav-clear .nav-link.nl-on{color:#fff;background:rgba(255,255,255,0.18);}
  .nav-actions{display:flex;gap:8px;align-items:center;}
  .btn-primary{background:linear-gradient(135deg,var(--accent) 0%,var(--accentd) 100%);border:none;color:#fff;padding:9px 18px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.2s;box-shadow:0 4px 18px rgba(0,0,0,0.3);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 7px 26px rgba(0,0,0,0.42);}
  .btn-discord{display:inline-flex;align-items:center;gap:8px;background:#5865f2;border:none;color:#fff;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all 0.2s;box-shadow:0 4px 18px rgba(88,101,242,0.35);}
  .btn-discord:hover{background:#4752c4;transform:translateY(-1px);}
  .btn-discord.big{padding:13px 22px;font-size:15px;border-radius:12px;}

  .lang-wrap{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#a3aec4;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.18s;}
  .lang-btn:hover{background:rgba(255,255,255,0.09);color:#e8ecf6;}
  .nav-clear .lang-btn{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3);color:#fff;}
  .lang-drop{position:absolute;top:calc(100% + 8px);right:0;background:#0d1422;border-radius:12px;overflow:hidden;min-width:152px;box-shadow:0 16px 48px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.08);z-index:600;animation:dropIn 0.18s ease;}
  .lang-opt{display:flex;align-items:center;gap:10px;padding:11px 16px;width:100%;background:transparent;border:none;color:#cdd3e2;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background 0.15s;text-align:left;}
  .lang-opt:hover{background:rgba(255,255,255,0.06);}
  .lang-opt.l-active{color:var(--accent);}

  .udrop-wrap{position:relative;}
  .uavatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:2.5px solid rgba(255,255,255,0.18);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:800;font-family:'Outfit',sans-serif;transition:all 0.18s;flex-shrink:0;overflow:hidden;}
  .uavatar img{width:100%;height:100%;object-fit:cover;}
  .uavatar:hover{border-color:rgba(255,255,255,0.5);transform:scale(1.06);}
  .udrop{position:absolute;top:calc(100% + 12px);right:0;background:#0b1120;border-radius:14px;overflow:hidden;min-width:232px;box-shadow:0 28px 70px rgba(0,0,0,0.88),0 0 0 1px rgba(255,255,255,0.08);z-index:600;animation:dropIn 0.2s cubic-bezier(.32,.72,0,1);}
  @keyframes dropIn{from{opacity:0;transform:translateY(-6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .udrop-name{padding:18px 20px 14px;font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:#e8ecf6;}
  .udrop-hr{height:1px;background:rgba(255,255,255,0.07);}
  .ddi{display:flex;align-items:center;gap:13px;padding:13px 20px;width:100%;background:transparent;border:none;color:#cdd3e2;font-size:12.5px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.7px;text-transform:uppercase;transition:background 0.15s;text-align:left;}
  .ddi:hover{background:rgba(255,255,255,0.06);color:#e8ecf6;}
  .ddi.ddi-danger{color:#e85d5d;}
  .ddi.ddi-danger:hover{background:rgba(220,60,60,0.09);}
  .ddi-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}

  .hero{position:relative;overflow:hidden;margin-top:-66px;padding:150px 24px 96px;text-align:center;background:linear-gradient(176deg,#5aa6e0 0%,#7fbce6 20%,#a4c8e8 42%,#bfc4e7 62%,#d3c1dc 82%,#dcc3d6 100%);}
  .sun-glow{position:absolute;top:-170px;left:28%;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(255,251,234,0.7),transparent 64%);filter:blur(16px);pointer-events:none;}
  .rainbow{position:absolute;top:26%;left:-12%;width:124%;height:88px;transform:rotate(-17deg);background:linear-gradient(180deg,rgba(255,120,120,0) 0%,rgba(255,120,120,0.2) 18%,rgba(255,196,116,0.2) 34%,rgba(255,240,140,0.2) 50%,rgba(150,225,160,0.2) 64%,rgba(132,188,250,0.2) 80%,rgba(192,142,236,0.2) 92%,rgba(192,142,236,0) 100%);filter:blur(9px);pointer-events:none;}
  .cloud{position:absolute;border-radius:50%;background:#fff;filter:blur(34px);pointer-events:none;}
  .cloud-1{width:360px;height:160px;bottom:-44px;left:-70px;opacity:0.62;}
  .cloud-2{width:440px;height:210px;bottom:-90px;right:-90px;opacity:0.62;}
  .cloud-3{width:240px;height:112px;top:50px;left:13%;opacity:0.34;}
  .cloud-4{width:300px;height:140px;bottom:6px;left:34%;opacity:0.5;}
  .cloud-5{width:200px;height:96px;top:96px;left:46%;opacity:0.3;}
  .hero-content{position:relative;z-index:2;max-width:760px;margin:0 auto;}
  .hero-heading{font-family:'Outfit',sans-serif;font-weight:900;font-size:clamp(34px,6.4vw,62px);color:#fff;text-transform:uppercase;letter-spacing:1.5px;line-height:1.08;margin-bottom:34px;text-shadow:0 5px 26px rgba(35,55,115,0.4),0 2px 5px rgba(0,0,0,0.12);animation:fadeUp 0.6s ease both;}
  .hero-discord-line{display:inline-flex;align-items:center;gap:14px;justify-content:center;}
  .hero-discord-line svg{filter:drop-shadow(0 3px 8px rgba(40,60,120,0.3));}
  .search-wrap{display:flex;align-items:center;background:rgba(255,255,255,0.96);border-radius:100px;padding:8px 8px 8px 28px;max-width:640px;margin:0 auto;box-shadow:0 16px 46px rgba(35,55,115,0.28);animation:fadeUp 0.6s ease 0.1s both;}
  .search-input{flex:1;background:transparent;border:none;outline:none;color:#1b2336;font-size:16px;font-family:'DM Sans',sans-serif;font-weight:500;}
  .search-input::placeholder{color:#94a0b6;}
  .search-btn{width:48px;height:48px;border-radius:50%;background:rgba(20,29,48,0.06);border:none;color:#3a4660;cursor:pointer;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.18s;}
  .search-btn:hover{background:rgba(20,29,48,0.13);}
  .hero-dash-btn{position:absolute;right:24px;bottom:24px;z-index:3;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:800;font-size:13px;letter-spacing:0.6px;text-transform:uppercase;cursor:pointer;box-shadow:0 8px 22px rgba(20,40,80,0.32);font-family:'Outfit',sans-serif;transition:all 0.2s;}
  .hero-dash-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(20,40,80,0.45);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .tagcloud-sec{background:#0e1626;padding:40px 24px 24px;}
  .tagcloud{max-width:1080px;margin:0 auto;display:flex;flex-wrap:wrap;gap:7px 22px;justify-content:center;align-items:baseline;}
  .tcl{display:inline-flex;align-items:baseline;gap:6px;cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;padding:3px 2px;transition:transform 0.12s;}
  .tcl:hover{transform:translateY(-1px);}
  .tcl-name{font-weight:800;font-size:15px;letter-spacing:0.3px;text-transform:uppercase;color:#c3cbdc;transition:color 0.15s;}
  .tcl:hover .tcl-name{color:#fff;}
  .tcl.tcl-on .tcl-name{color:var(--accent);}
  .tcl-count{font-size:12px;font-weight:600;color:#5c6886;font-family:'DM Sans',sans-serif;}

  .main-wrap{max-width:1240px;margin:0 auto;padding:24px 24px 80px;}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
  .section-title{font-family:'Outfit',sans-serif;font-size:clamp(24px,3.6vw,34px);font-weight:900;color:#e8ecf6;letter-spacing:-0.5px;line-height:1.1;text-transform:uppercase;max-width:520px;}
  .section-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .sort-sel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#c3cbdc;padding:9px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.18s;}
  .sort-sel:hover{border-color:rgba(255,255,255,0.2);}
  .sort-sel option{background:#141d30;color:#e8ecf6;}
  .section-btn{background:transparent;border:1px solid rgba(255,255,255,0.22);color:#c3cbdc;padding:9px 18px;border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;transition:all 0.18s;white-space:nowrap;}
  .section-btn:hover{border-color:rgba(255,255,255,0.4);color:#fff;background:rgba(255,255,255,0.04);}

  .filter-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  .fc-label{font-size:13px;color:#5c6886;font-weight:500;}
  .atag{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;background:rgba(255,255,255,0.04);border:1px solid var(--accent);color:var(--accent);font-size:13px;font-weight:500;}
  .atag-x{background:none;border:none;color:inherit;cursor:pointer;font-size:16px;padding:0;line-height:1;opacity:0.8;}
  .atag-x:hover{opacity:1;}
  .fc-clear{background:none;border:none;color:#5c6886;cursor:pointer;font-size:13px;font-weight:600;text-decoration:underline;font-family:'DM Sans',sans-serif;}
  .fc-clear:hover{color:#c3cbdc;}

  .server-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
  .scard{background:#18223a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:13px;transition:transform 0.24s,border-color 0.24s,box-shadow 0.24s;}
  .scard:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 18px 50px rgba(0,0,0,0.4);}
  .scard.is-boosted{border-color:rgba(251,146,60,0.4);box-shadow:0 0 0 1px rgba(251,146,60,0.2),0 14px 40px rgba(0,0,0,0.35);}
  .scard-head{display:flex;align-items:center;justify-content:space-between;min-height:26px;}
  .boost-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#fb923c,#f97316);color:#fff;font-size:11.5px;font-weight:800;padding:4px 11px;border-radius:100px;letter-spacing:0.4px;text-transform:uppercase;box-shadow:0 3px 12px rgba(251,146,60,0.4);}
  .srating{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,0.22);padding:3px 11px;border-radius:100px;}
  .stars{color:#fbbf24;font-size:13px;letter-spacing:1px;}
  .sreviews{font-size:12px;color:#8995ad;}
  .scard-menu{background:none;border:none;color:#5c6886;cursor:pointer;font-size:18px;padding:0 4px;line-height:1;transition:color 0.15s;}
  .scard-menu:hover{color:#c3cbdc;}
  .scard-main{display:flex;align-items:center;gap:14px;}
  .sicon{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;border:1px solid rgba(255,255,255,0.08);overflow:hidden;}
  .sicon img{width:100%;height:100%;object-fit:cover;}
  .sinfo{flex:1;min-width:0;}
  .sstatus{display:flex;align-items:center;gap:12px;margin-bottom:3px;}
  .sonline{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#4ade80;}
  .sbump{font-size:12px;color:#7c879f;display:inline-flex;align-items:center;gap:4px;}
  .sname{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;color:#e8ecf6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stags{display:flex;flex-wrap:wrap;gap:6px;}
  .stag{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);color:#8b95ab;font-size:11.5px;padding:3px 10px;border-radius:7px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;transition:all 0.15s;cursor:pointer;}
  .stag:hover{border-color:var(--accent);color:#c3cbdc;}
  .sdesc{font-size:13.5px;color:#9aa4ba;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-line;}
  .card-btns{display:flex;gap:9px;margin-top:2px;}
  .join-btn{flex:1;background:linear-gradient(135deg,#5865f2,#4752c4);border:none;color:#fff;padding:12px 18px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:0.4px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;box-shadow:0 4px 16px rgba(88,101,242,0.32);}
  .join-btn:hover{box-shadow:0 6px 24px rgba(88,101,242,0.5);transform:translateY(-1px);}
  .vote-btn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.2);color:#fb923c;padding:12px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all 0.18s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .vote-btn:hover{background:rgba(251,146,60,0.16);border-color:rgba(251,146,60,0.4);}
  .vote-btn.voted{background:rgba(251,146,60,0.2);border-color:rgba(251,146,60,0.45);}

  .empty-state{text-align:center;padding:96px 20px;color:#5c6886;}
  .empty-icon{font-size:68px;margin-bottom:20px;}
  .empty-title{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:#e8ecf6;margin-bottom:10px;}
  .empty-sub{font-size:15px;margin-bottom:28px;}
  .empty-cta{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:#fff;padding:13px 28px;border-radius:13px;cursor:pointer;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:0.3px;transition:all 0.2s;box-shadow:0 6px 20px rgba(0,0,0,0.32);}
  .empty-cta:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.45);}

  .load-more-wrap{text-align:center;margin-top:48px;}
  .load-more-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#8995ad;padding:14px 48px;border-radius:13px;cursor:pointer;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
  .load-more-btn:hover{background:rgba(255,255,255,0.07);color:#e8ecf6;border-color:rgba(255,255,255,0.2);transform:translateY(-1px);}

  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;animation:bfIn 0.22s ease;}
  @keyframes bfIn{from{opacity:0}to{opacity:1}}
  .modal{background:#141d30;border:1px solid rgba(255,255,255,0.09);border-radius:22px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:mUp 0.26s cubic-bezier(.22,.68,0,1.2);box-shadow:0 40px 100px rgba(0,0,0,0.65);}
  @keyframes mUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal::-webkit-scrollbar{width:5px;}
  .modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
  .mhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:24px 26px 0;}
  .mtitle{font-family:'Outfit',sans-serif;font-size:21px;font-weight:800;color:#e8ecf6;line-height:1.25;}
  .msub{font-size:13.5px;color:#8995ad;margin-top:4px;}
  .mclose{background:rgba(255,255,255,0.07);border:none;color:#8995ad;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;}
  .mclose:hover{background:rgba(255,255,255,0.13);color:#e8ecf6;}
  .mform{padding:20px 26px 26px;display:flex;flex-direction:column;gap:18px;}
  .fg{display:flex;flex-direction:column;gap:7px;}
  .fg label{font-size:12.5px;font-weight:600;color:#8995ad;letter-spacing:0.4px;text-transform:uppercase;}
  .fi,.fta{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#e8ecf6;padding:11px 15px;border-radius:11px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.18s,box-shadow 0.18s;width:100%;}
  .fi:focus,.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,255,0.12);}
  .fi::placeholder,.fta::placeholder{color:#475066;}
  .fta{resize:vertical;min-height:104px;}
  .sub-btn{background:linear-gradient(135deg,#5865f2,#4752c4);border:none;color:#fff;padding:14px;border-radius:13px;cursor:pointer;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all 0.2s;box-shadow:0 4px 20px rgba(88,101,242,0.32);}

  .desc-wrap{position:relative;}
  .desc-ta{background:#141d30;border:1px solid rgba(255,255,255,0.12);color:#e8ecf6;padding:13px 15px;border-radius:11px;font-size:14.5px;font-family:'DM Sans',sans-serif;outline:none;width:100%;min-height:130px;resize:vertical;line-height:1.55;transition:border-color 0.18s;}

  .check-row{display:flex;align-items:flex-start;gap:13px;cursor:pointer;}

  .warn-box{display:flex;gap:12px;align-items:flex-start;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.28);border-radius:13px;padding:15px 17px;}

  .save-btn{background:linear-gradient(135deg,var(--accent),var(--accentd));border:none;color:#fff;padding:12px 30px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all 0.2s;box-shadow:0 6px 20px rgba(0,0,0,0.3);}

  /* server detail page */
  .detail-wrap{max-width:880px;margin:0 auto;padding:30px 24px 90px;}

  .detail-icon{width:88px;height:88px;border-radius:22px;background:#222d48;display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
  .detail-icon img{width:100%;height:100%;object-fit:cover;}
  .detail-badges{display:flex;gap:10px;flex-wrap:wrap;padding-top:8px;}
  .db-online{background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:7px 14px;border-radius:100px;}
  .db-total{background:#0e1626;color:#c3cbdc;font-weight:700;font-size:13px;padding:7px 14px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);}
  .detail-name{font-family:'Outfit',sans-serif;font-weight:900;font-size:clamp(26px,4.6vw,40px);color:#fff;line-height:1.12;letter-spacing:-0.5px;margin-bottom:14px;word-break:break-word;}
  .detail-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .detail-tag{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#c3cbdc;font-size:12px;font-weight:700;letter-spacing:0.4px;padding:5px 12px;border-radius:8px;}
  .detail-desc{color:#c3cbdc;font-size:15px;line-height:1.7;white-space:pre-line;margin-bottom:16px;}
  .detail-bumped{font-size:13px;color:#5c6886;text-align:right;margin-bottom:18px;}
  .detail-actions{display:flex;gap:10px;align-items:center;border-top:1px solid rgba(255,255,255,0.06);padding-top:18px;}
  .detail-join{flex:1;background:linear-gradient(135deg,#5865f2,#4752c4);border:none;color:#fff;padding:15px;border-radius:13px;cursor:pointer;font-size:15px;font-weight:800;font-family:'Outfit',sans-serif;letter-spacing:0.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:all 0.2s;box-shadow:0 6px 20px rgba(88,101,242,0.4);}
  .detail-join:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(88,101,242,0.55);}
  .detail-vote{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:#fb923c;padding:15px 20px;border-radius:13px;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all 0.18s;white-space:nowrap;}
  .detail-vote:hover{background:rgba(251,146,60,0.16);}
  .detail-vote.voted{background:rgba(251,146,60,0.2);border-color:rgba(251,146,60,0.45);}

  .reviews-sec{margin-top:40px;}
  .reviews-title{font-family:'Outfit',sans-serif;font-weight:900;font-size:28px;color:#e8ecf6;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:26px;}
  .reviews-empty{text-align:center;padding:44px 20px;color:#5c6886;background:#18223a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;}
  .reviews-summary{display:flex;gap:34px;align-items:center;background:#18223a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:26px;flex-wrap:wrap;}
  .rs-score{text-align:center;flex-shrink:0;}
  .rs-num{font-family:'Outfit',sans-serif;font-weight:900;font-size:48px;color:#e8ecf6;line-height:1;margin-top:6px;}
  .rs-count{font-size:13px;color:#7c879f;margin-top:4px;}
  .rs-bars{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px;}
  .rs-bar-row{display:flex;align-items:center;gap:10px;}
  .rs-bar-label{font-size:11px;color:#fbbf24;width:66px;letter-spacing:1px;white-space:nowrap;}
  .rs-bar-track{flex:1;height:8px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;}
  .rs-bar-fill{height:100%;background:#fbbf24;border-radius:100px;transition:width 0.3s;}
  .stars-row{display:inline-flex;gap:2px;}
  .star{color:#3a4660;position:relative;display:inline-block;}

  .review-list{display:flex;flex-direction:column;gap:14px;margin-top:18px;}
  .review-card{background:#18223a;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px;}
  .review-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
  .review-author{display:flex;align-items:center;gap:11px;}

  .ra-name{font-weight:700;font-size:14px;color:#e8ecf6;}
  .ra-stars{font-size:14px;margin-top:2px;}
  .review-votes{display:flex;gap:12px;color:#7c879f;font-size:13px;font-weight:600;flex-shrink:0;}
  .review-text{color:#aab3c7;font-size:14px;line-height:1.6;white-space:pre-line;}
  .review-form{background:#18223a;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;margin-top:18px;display:flex;flex-direction:column;gap:14px;}

  /* bot-not-added warning + featured */
  .bot-warn{display:flex;align-items:flex-start;gap:10px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:11px 14px;margin-top:10px;width:100%;}

  .review-note{display:flex;align-items:flex-start;gap:10px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.25);border-radius:12px;padding:11px 14px;margin-top:10px;width:100%;font-size:12.5px;color:#9fd3ef;line-height:1.45;}
  .feat-badge2{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1b1300;font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:0.4px;}

  /* admin panel */
  .admin-wrap{max-width:1180px;margin:0 auto;padding:40px 24px 90px;}

  .admin-card{background:#18223a;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .ac-ic{width:46px;height:46px;border-radius:11px;background:#222d48;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}

  .adm-btn{border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#c3cbdc;padding:7px 13px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
  .adm-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
  .adm-btn.ok{border-color:rgba(74,222,128,0.4);color:#4ade80;background:rgba(74,222,128,0.08);}
  .adm-btn.ok:hover{background:rgba(74,222,128,0.18);}
  .adm-btn.bad{border-color:rgba(239,68,68,0.4);color:#f87171;background:rgba(239,68,68,0.08);}
  .adm-btn.bad:hover{background:rgba(239,68,68,0.18);}
  .adm-btn.gold{border-color:rgba(251,191,36,0.4);color:#fbbf24;background:rgba(251,191,36,0.08);}
  .adm-btn.gold:hover{background:rgba(251,191,36,0.18);}
  .adm-btn.gold.on{background:#fbbf24;color:#1b1300;border-color:#fbbf24;}
  .admin-empty{text-align:center;padding:54px 20px;color:#5c6886;}

  .admin-set-row .asr-desc{font-size:12.5px;color:#7c879f;margin-top:2px;}

/* ── Ergänzungen (Toasts, Spinner, Overlay) ── */

function starsHtml(v){ let o=""; for(let i=1;i<=5;i++){ const c=v>=i?"full":(v>=i-0.5?"half":"empty"); o+=`<span class="star ${c}">★</span>`; } return `<span class="stars-row">${o}</span>`; }
function iconHtml(url,name,cls){ const L=esc((name||"?").trim().charAt(0).toUpperCase());
  return url?`<div class="${cls}"><img src="${esc(url)}" alt="" loading="lazy"></div>`:`<div class="${cls}">${L}</div>`; }
async function api(path,opts={}){
  const res=await fetch(path,{credentials:"same-origin",
    headers:opts.body?{"Content-Type":"application/json"}:{}, ...opts,
    body:opts.body?JSON.stringify(opts.body):undefined});
  let data=null; try{ data=await res.json(); }catch{}
  if(!res.ok) throw {status:res.status,data};
  return data;
}
function toast(msg,kind=""){
  const el=document.createElement("div");
  el.className=`toast ${kind}`; el.textContent=msg;
  $("#toasts").appendChild(el); setTimeout(()=>el.remove(),4200);
}
function confirmBox(title,text,okLabel,danger){
  return new Promise(res=>{
    const ov=$("#overlay");
    ov.innerHTML=`<div class="modal-back"><div class="modal">
      <div class="mhead"><div><h2 class="mtitle">${esc(title)}</h2></div><button class="mclose" id="m-x">✕</button></div>
      <div class="mform"><p style="color:#9aa4ba;font-size:14px;line-height:1.6">${esc(text)}</p>
      <div class="row-2"><button class="ghost-btn" id="m-no" style="flex:1">${esc(t().cancel)}</button>
      <button class="sub-btn" id="m-yes" style="${danger?"background:linear-gradient(135deg,#ef4444,#b91c1c)":""}">${esc(okLabel)}</button></div></div></div></div>`;
    ov.style.display="block";
    const close=v=>{ov.style.display="none";ov.innerHTML="";res(v);};
    $("#m-x").onclick=()=>close(false); $("#m-no").onclick=()=>close(false); $("#m-yes").onclick=()=>close(true);
    ov.querySelector(".modal-back").onclick=e=>{ if(e.target.classList.contains("modal-back"))close(false); };
  });
}
function promptBox(title,ph,okLabel){
  return new Promise(res=>{
    const ov=$("#overlay");
    ov.innerHTML=`<div class="modal-back"><div class="modal">
      <div class="mhead"><div><h2 class="mtitle">${esc(title)}</h2></div><button class="mclose" id="m-x">✕</button></div>
      <div class="mform"><div class="fg"><textarea class="fta" id="m-txt" rows="4" maxlength="500" placeholder="${esc(ph)}"></textarea></div>
      <button class="sub-btn" id="m-yes">${esc(okLabel)}</button></div></div></div>`;
    ov.style.display="block";
    const close=v=>{ov.style.display="none";ov.innerHTML="";res(v);};
    $("#m-x").onclick=()=>close(null);
    $("#m-yes").onclick=()=>{const v=$("#m-txt").value.trim();close(v||null);};
    ov.querySelector(".modal-back").onclick=e=>{ if(e.target.classList.contains("modal-back"))close(null); };
  });
}

function go(path){ history.pushState({},"",path); render(); window.scrollTo({top:0}); }
window.addEventListener("popstate",()=>render());
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-go]");
  if(el){ e.preventDefault(); go(el.getAttribute("data-go")); }
});
function route(){
  const p=location.pathname; let m;
  if((m=p.match(/^\/server\/(\d+)/))) return {v:"detail",id:m[1]};
  if((m=p.match(/^\/edit\/(\d+)/)))   return {v:"edit",id:m[1]};
  if(p.startsWith("/add"))       return {v:"add"};
  if(p.startsWith("/dashboard")) return {v:"dash"};
  if(p.startsWith("/vorschlaege")||p.startsWith("/suggestions")) return {v:"sug"};
  if(p.startsWith("/admin"))     return {v:"admin"};
  return {v:"browse"};
}

  S.home.sort=p.get("sort")||"trending"; S.home.offset=0;
  app.innerHTML=`
  <section class="hero">
    <div class="sun-glow"></div><div class="rainbow"></div>
    <div class="cloud cloud-1"></div><div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div><div class="cloud cloud-4"></div><div class="cloud cloud-5"></div>
    <div class="hero-content">
      <h1 class="hero-heading">${esc(t().discoverWord)}<br>
        <span class="hero-discord-line">${DISCORD_SVG(48)} Discord</span><br>${esc(t().serversWord)}</h1>
      <div class="search-wrap">
        <input class="search-input" id="q" placeholder="${esc(t().searchPlaceholder)}" value="${esc(S.home.tag?("#"+S.home.tag):S.home.q)}" maxlength="60">
        <button class="search-btn" id="qbtn">🔍</button>
      </div>
    </div>
    <button class="hero-dash-btn" data-go="/dashboard">${esc(t().toDashboard)}</button>
  </section>
  <section class="tagcloud-sec"><div class="tagcloud" id="tagcloud"></div></section>
  <main class="main-wrap">
    <div class="section-head">
      <h2 class="section-title">${esc(t().activeTitle)}</h2>
      <div class="section-actions">
        <select class="sort-sel" id="sortsel">
          <option value="trending" ${S.home.sort==="trending"?"selected":""}>${esc(t().sortTrending)}</option>
          <option value="members" ${S.home.sort==="members"?"selected":""}>${esc(t().sortMembers)}</option>
          <option value="rating" ${S.home.sort==="rating"?"selected":""}>${esc(t().sortVotes)}</option>
          <option value="newest" ${S.home.sort==="newest"?"selected":""}>${esc(t().sortNewest)}</option>
        </select>
        <button class="section-btn" data-go="/">${esc(t().allServersBtn)}</button>
      </div>
    </div>
    <div id="filterrow"></div>
    <div class="server-grid" id="grid"></div>
    <div class="load-more-wrap" id="loadmore"></div>
  </main>`;
  const submit=()=>{
    const raw=$("#q").value.trim();
    const sp=new URLSearchParams();
    if(raw.startsWith("#")&&raw.length>1) sp.set("tag",raw.slice(1).toLowerCase());
    else if(raw) sp.set("q",raw);
    if(S.home.sort!=="trending") sp.set("sort",S.home.sort);
    go("/"+(sp.toString()?`?${sp}`:""));
  };
  $("#qbtn").onclick=submit;
  $("#q").addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
  $("#sortsel").onchange=e=>{
    const sp=new URLSearchParams(location.search);
    if(e.target.value==="trending")sp.delete("sort");else sp.set("sort",e.target.value);
    go("/"+(sp.toString()?`?${sp}`:""));
  };
  /* Filter-Chips */
  const fr=$("#filterrow");
  if(S.home.q||S.home.tag){
    fr.innerHTML=`<div class="filter-chips"><span class="fc-label">${esc(t().filterBy)}:</span>
      ${S.home.tag?`<span class="atag">#${esc(S.home.tag)}<button class="atag-x" id="fx">×</button></span>`:""}
      ${S.home.q?`<span class="atag">"${esc(S.home.q)}"<button class="atag-x" id="fx">×</button></span>`:""}
      <button class="fc-clear" data-go="/">${esc(t().clearFilters)}</button></div>`;
    const fx=$("#fx"); if(fx)fx.onclick=()=>go("/");
  }
  loadTags(); loadServers(false);
}
async function loadTags(){
  try{
    const d=await api("/api/tags");
    const el=$("#tagcloud"); if(!el)return;
    const tags=(d.tags||[]).slice(0,28);
    el.innerHTML=tags.map(x=>`<button class="tcl ${S.home.tag===x.tag?"tcl-on":""}" data-tag="${esc(x.tag)}">
      <span class="tcl-name">${esc(x.tag)}</span><span class="tcl-count">${fmt(x.n)}</span></button>`).join("");
    el.querySelectorAll("[data-tag]").forEach(b=>b.onclick=()=>{
      const tg=b.dataset.tag===S.home.tag?"":b.dataset.tag;
      const sp=new URLSearchParams(location.search); sp.delete("q");
      if(tg)sp.set("tag",tg);else sp.delete("tag");
      go("/"+(sp.toString()?`?${sp}`:""));
    });
  }catch{}
}
async function loadServers(append){
  const grid=$("#grid"); if(!grid)return;
  if(!append)grid.innerHTML='<div class="spin"></div>';
  try{
    const sp=new URLSearchParams({sort:S.home.sort,limit:"24",offset:String(S.home.offset)});
    if(S.home.q)sp.set("q",S.home.q); if(S.home.tag)sp.set("tag",S.home.tag);
    const d=await api(`/api/servers?${sp}`);
    S.home.total=d.total;
    const html=(d.servers||[]).map(serverCard).join("");
    if(append)grid.insertAdjacentHTML("beforeend",html);
    else grid.innerHTML=html||`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">${S.home.q||S.home.tag?"🔍":"🔭"}</div>
      <p class="empty-title">${esc(S.home.q||S.home.tag?t().noSearchResults:t().noServers)}</p>
      <p class="empty-sub">${esc(S.home.q||S.home.tag?t().noSearchSub:t().noServersSub)}</p>
      ${S.home.q||S.home.tag?"":`<button class="empty-cta" data-go="/add">+ ${esc(t().addFirstServer)}</button>`}</div>`;
    const lm=$("#loadmore");
    const shown=S.home.offset+(d.servers||[]).length;
    if(lm){
      lm.innerHTML=shown<d.total?`<button class="load-more-btn" id="morebtn">${esc(t().loadMore)}</button>`:"";
      const mb=$("#morebtn");
      if(mb)mb.onclick=()=>{S.home.offset=shown;loadServers(true);};
    }
  }catch{
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><p class="empty-sub">${esc(t().errNet)}</p></div>`;
  }
}

async function viewDetail(id){
  const app=$("#app");
  app.innerHTML=`<div class="detail-wrap"><div class="spin"></div></div>`;
  let d;
  try{ d=await api(`/api/servers/${id}`); }
  catch{ toast(t().noSearchResults,"err"); return go("/"); }
  const s=d.server, revs=d.reviews||[];
  const me=S.user, isOwner=me&&me.id===s.ownerId, canEdit=isOwner||S.isAdmin;
  const myReview=me?revs.find(r=>r.userId===me.id):null;
  document.title=`${s.name} – Servify`;
  const count=revs.length;
  const avg=count?revs.reduce((a,r)=>a+r.rating,0)/count:0;
  const dist=[5,4,3,2,1].map(st=>revs.filter(r=>r.rating===st).length);
  const maxDist=Math.max(1,...dist);
  app.innerHTML=`<div class="detail-wrap">
    <button class="back-link" data-go="/">← ${esc(t().backToBrowse)}</button>
    <div class="detail-card">
      <div class="detail-top">
        ${iconHtml(s.icon,s.name,"detail-icon")}
        <div class="detail-badges">
          ${s.featured?`<span class="feat-badge2">★ ${esc(t().featuredBadge)}</span>`:""}
          ${s.online?`<span class="db-online">${fmt(s.online)} ${esc(t().online)}</span>`:""}
          ${s.members?`<span class="db-total">${fmt(s.members)} ${esc(t().totalLabel)}</span>`:""}
          ${s.nsfw?`<span class="pill pill-reject">NSFW</span>`:""}
          ${s.status==="pending"?`<span class="pill pill-review">${esc(t().statusInReview)}</span>`:""}
        </div>
      </div>
      <h1 class="detail-name">${esc(s.name)}</h1>
      ${(s.tags||[]).length?`<div class="detail-tags">${s.tags.map(x=>`<span class="detail-tag">${esc(x.toUpperCase())}</span>`).join("")}</div>`:""}
      ${s.description?`<p class="detail-desc">${esc(s.description)}</p>`:""}
      ${s.lastBumpAt?`<div class="detail-bumped">${esc(t().bumpedAgo(fmtAgo(s.lastBumpAt)))}</div>`:""}
      <div class="detail-actions">
        ${s.inviteUrl
          ?`<a class="detail-join" href="${esc(s.inviteUrl)}" target="_blank" rel="noopener noreferrer">${esc(t().joinServer)} →</a>`
          :`<a class="detail-join" style="opacity:.45;pointer-events:none">${esc(t().joinServer)} →</a>`}
        ${isOwner?`<button class="dash-bump-btn" id="bumpbtn" style="padding:15px 20px;border-radius:13px"></button>`:""}
        ${canEdit?`<button class="dc-view" data-go="/edit/${esc(s.guildId)}" style="padding:15px 20px;border-radius:13px">${esc(t().editBtn)}</button>`:""}
      </div>
      ${me&&!isOwner?`<div style="text-align:right;margin-top:10px"><button class="report-link" id="repbtn">🚩 ${esc(t().reportBtn)}</button></div>`:""}
    </div>

    <div class="reviews-sec">
      <h2 class="reviews-title">${esc(t().ratingsReviews)}</h2>
      ${count===0?`<div class="reviews-empty">
          <div style="font-size:46px;margin-bottom:10px">⭐</div>
          <p class="empty-title" style="font-size:19px">${esc(t().noReviews)}</p>
          <p class="empty-sub" style="margin-bottom:0">${esc(t().noReviewsSub)}</p></div>`
        :`<div class="reviews-summary">
          <div class="rs-score">${starsHtml(avg)}<div class="rs-num">${avg.toFixed(1)}</div>
            <div class="rs-count">${count} ${esc(count===1?t().review:t().reviews)}</div></div>
          <div class="rs-bars">${[5,4,3,2,1].map((st,i)=>`<div class="rs-bar-row">
            <span class="rs-bar-label">${"★".repeat(st)}</span>
            <div class="rs-bar-track"><div class="rs-bar-fill" style="width:${dist[i]/maxDist*100}%"></div></div></div>`).join("")}</div>
        </div>
        <div class="review-list">${revs.map(r=>`<div class="review-card">
          <div class="review-head"><div class="review-author">
            ${r.userAvatar?`<img class="ra-av" src="${esc(r.userAvatar)}" alt="" style="object-fit:cover">`:`<div class="ra-av">${esc((r.userName||"?")[0].toUpperCase())}</div>`}
            <div><div class="ra-name">${esc(r.userName)}</div><div class="ra-stars">${starsHtml(r.rating)}</div></div>
          </div><span style="color:#5c6886;font-size:12px">${fmtAgo(r.createdAt)}</span></div>
          ${r.text?`<p class="review-text">${esc(r.text)}</p>`:""}
        </div>`).join("")}</div>`}
      <div id="revform"></div>
    </div>
  </div>`;

  /* Bump (nur Besitzer) */
  const bb=$("#bumpbtn");
  if(bb){
    const paint=()=>{
      const left=(s.canBumpAt||0)-Date.now();
      if(left>0){bb.disabled=true;bb.textContent=`⬆ ${fmtClock(left)}`;}
      else{bb.disabled=false;bb.textContent="⬆ Bump";}
    };
    paint(); S.timers.push(setInterval(paint,1000));
    bb.onclick=async()=>{
      try{const r=await api(`/api/servers/${s.guildId}/bump`,{method:"POST"});s.canBumpAt=r.canBumpAt;toast(t().bumped,"ok");}
      catch(e){if(e.data&&e.data.canBumpAt)s.canBumpAt=e.data.canBumpAt;}
    };
  }
  /* Melden */
  const rb=$("#repbtn");
  if(rb)rb.onclick=async()=>{
    const reason=await promptBox(t().reportTitle,t().reportPlaceholder,t().reportSend);
    if(!reason)return;
    try{await api(`/api/servers/${s.guildId}/report`,{method:"POST",body:{reason}});toast(t().reportThanks,"ok");}
    catch{toast(t().errNet,"err");}
  };
  /* Rezensions-Formular */
  let pick=myReview?myReview.rating:0;
  function paintForm(){
    const box=$("#revform"); if(!box)return;
    if(!me){box.innerHTML=`<p class="review-login-hint">${esc(t().reviewLoginHint)}</p>`;return;}
    if(isOwner){box.innerHTML=`<p class="review-login-hint">${esc(t().ownServerHint)}</p>`;return;}
    box.innerHTML=`<div class="review-form">
      <div class="rf-title">${esc(myReview?t().yourReview:t().writeReview)}</div>
      <div class="rf-stars" id="rfstars">${[1,2,3,4,5].map(i=>`<button class="rf-star ${pick>=i?"on":""}" data-s="${i}">★</button>`).join("")}</div>
      <textarea class="desc-ta" id="revtxt" maxlength="800" placeholder="${esc(t().reviewPlaceholder)}">${esc(myReview?myReview.text:"")}</textarea>
      <div class="row-2">
        <button class="save-btn" id="revsend" ${pick?"":"disabled"} style="flex:1">${esc(t().submitReview)}</button>
        ${myReview?`<button class="del-btn" id="revdel">${esc(t().deleteReview)}</button>`:""}
      </div></div>`;
    document.querySelectorAll("#rfstars .rf-star").forEach(b=>b.onclick=()=>{pick=+b.dataset.s;paintForm();});
    $("#revsend").onclick=async()=>{
      try{await api(`/api/servers/${s.guildId}/reviews`,{method:"POST",body:{rating:pick,text:$("#revtxt").value}});
        toast(t().savedToast,"ok");viewDetail(id);}
      catch{toast(t().errNet,"err");}
    };
    const rd=$("#revdel");
    if(rd)rd.onclick=async()=>{
      try{await api(`/api/servers/${s.guildId}/reviews`,{method:"DELETE"});viewDetail(id);}
      catch{toast(t().errNet,"err");}
    };
  }
  paintForm();
}

        <label class="field-label">${esc(t().submitDesc)}</label>
        <div class="desc-wrap">
          <textarea class="desc-ta" id="f-desc" maxlength="1200" placeholder="${esc(t().submitDescPlaceholder)}">${esc(s.description)}</textarea>
          <div class="desc-count"><span id="dn">${s.description.length}</span>/1200</div>
        </div>
      </div>
      <label class="check-row" id="ck-nsfw">
        <span class="cbx ${s.nsfw?"on":""}">${s.nsfw?'<span class="cbx-check">✓</span>':""}</span>
        <span class="check-info"><div class="ci-title">${esc(t().nsfwTitle)}</div><div class="ci-sub">${esc(t().nsfwSub)}</div></span>
      </label>
      <label class="check-row" id="ck-pub">
        <span class="cbx ${s.isPublic?"on":""}">${s.isPublic?'<span class="cbx-check">✓</span>':""}</span>
        <span class="check-info"><div class="ci-title">${esc(t().publicTitle)}</div><div class="ci-sub">${esc(t().publicSub)}</div></span>
      </label>
      <div class="edit-actions">
        <button class="del-btn" id="delbtn">${esc(t().deleteServer)}</button>
        <button class="save-btn" id="savebtn">${esc(t().saveChanges)}</button>
      </div>
    </div></div>`;
  function paintTags(){
    const box=$("#htbox");
    box.innerHTML=tags.map(x=>`<span class="ht-chip">#${esc(x)}<button data-x="${esc(x)}">×</button></span>`).join("")
      +`<input class="ht-input" id="htin" placeholder="${esc(t().addHashtag)}" maxlength="24" ${tags.length>=8?"disabled":""}>`;
    box.querySelectorAll("[data-x]").forEach(b=>b.onclick=e=>{e.preventDefault();tags=tags.filter(x=>x!==b.dataset.x);paintTags();});
    const inp=$("#htin");
    const add=raw=>{const v=raw.trim().toLowerCase().replace(/^#/,"").replace(/[^a-z0-9äöüß\-]/g,"").slice(0,24);
      if(v&&!tags.includes(v)&&tags.length<8){tags.push(v);paintTags();const n=$("#htin");if(n)n.focus();}else inp.value="";};
    inp.onkeydown=e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();add(inp.value);}
      else if(e.key==="Backspace"&&!inp.value&&tags.length){tags.pop();paintTags();}};
    inp.onblur=()=>{if(inp.value)add(inp.value);};
  }
  paintTags();
  $("#f-desc").addEventListener("input",e=>{$("#dn").textContent=e.target.value.length;});
  const tgl=id=>{const c=$(id+" .cbx");c.classList.toggle("on");c.innerHTML=c.classList.contains("on")?'<span class="cbx-check">✓</span>':"";};
  $("#ck-nsfw").onclick=e=>{e.preventDefault();tgl("#ck-nsfw");};
  $("#ck-pub").onclick=e=>{e.preventDefault();tgl("#ck-pub");};
  $("#botcheck").onclick=async()=>{
    $("#botcheck").disabled=true;
    try{const r=await api(`/api/servers/${id}/bot-added`,{method:"POST"});
      $("#botpill").innerHTML=r.server.botAdded?`<span class="eh-botpill">✓ ${esc(t().botActive)}</span>`:`<span class="pill pill-pending">Bot fehlt</span>`;
      if(r.server.inviteUrl&&!$("#f-invite").value)$("#f-invite").value=r.server.inviteUrl;
      if(r.botConfigured===false)toast(t().botNoToken,"err");
      else toast(r.server.botAdded?t().botActive+" ✅":t().botStillMissing,r.server.botAdded?"ok":"");}
    catch{toast(t().errNet,"err");}
    $("#botcheck").disabled=false;
  };
  $("#savebtn").onclick=async()=>{
    const btn=$("#savebtn");btn.disabled=true;
    try{
      await api(`/api/servers/${id}`,{method:"PATCH",body:{
        description:$("#f-desc").value,tags,
        language:$("#f-lang").value,
        inviteUrl:$("#f-invite").value.trim(),
        nsfw:$("#ck-nsfw .cbx").classList.contains("on"),
        isPublic:$("#ck-pub .cbx").classList.contains("on"),
      }});
      toast(t().savedToast,"ok");
    }catch(e){toast(e.data&&e.data.error==="bad_invite"?"Ungültiger Discord-Link":t().errNet,"err");}
    btn.disabled=false;
  };
  $("#delbtn").onclick=async()=>{
    if(!(await confirmBox(t().deleteServer,t().deleteConfirm,t().deleteServer,true)))return;
    try{await api(`/api/servers/${id}`,{method:"DELETE"});go("/dashboard");}
    catch{toast(t().errNet,"err");}
  };
}

/* ── Dashboard ── */
async function viewDash(){
  const app=$("#app");
  if(!S.user){
    app.innerHTML=`<div class="dash-wrap"><div class="dash-login">
      <div class="login-emoji">🔐</div>
      <h3 style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:#e8ecf6;margin-bottom:8px">${esc(t().loginToListTitle)}</h3>
      <p style="color:#8995ad;font-size:14px;line-height:1.6;max-width:380px;margin:0 auto 22px">${esc(t().loginToListSub)}</p>
      <button class="btn-discord big" onclick="location.href='/auth/discord'">${DISCORD_SVG(18)} ${esc(t().login)}</button></div></div>`;
    return;
  }
  app.innerHTML=`<div class="dash-wrap">
    <h1 class="dash-title" style="text-align:left;padding:0 0 22px;letter-spacing:0;text-transform:none;font-size:34px">${esc(t().dashboard)}</h1>
    <div class="crumbs"><a data-go="/">${esc(t().crumbHome)}</a><span class="sep">›</span><span class="cur">${esc(t().dashboard)}</span></div>
    <div class="dash-cards" id="mylist"><div class="spin"></div></div>
    <button class="dash-add-card" data-go="/add">
      <div class="dac-row"><span class="dac-plus">+</span>${esc(t().addNewServer)}</div>
      <div class="dac-sub">${esc(t().addNewSub)}</div>
    </button></div>`;
  try{
    const d=await api("/api/me/servers");
    const list=d.servers||[];
    $("#mylist").innerHTML=list.length?list.map(s=>{
      const live=s.status==="approved"&&!s.hidden&&s.isPublic;
      return `<div class="dash-card">
        ${iconHtml(s.icon,s.name,"dc-icon")}
        <div class="dc-main">
          <div class="dc-title-row">
            <span class="dc-name">${esc(s.name)}</span>
            ${s.featured?`<span class="feat-badge2">★ ${esc(t().featuredBadge)}</span>`:""}
            <span class="dc-lang"><span class="dot"></span>${esc((s.language||"de").toUpperCase())}</span>
            ${s.status==="pending"?`<span class="pill pill-review">${esc(t().statusInReview)}</span>`:""}
            ${s.status==="rejected"?`<span class="pill pill-reject">${esc(t().statusRejected)}</span>`:""}
            ${s.hidden?`<span class="pill pill-hidden">${esc(t().statusHidden)}</span>`:""}
            ${live?`<span class="dc-pub pub">${esc(t().statusLive)}</span>`:""}
            ${s.status==="approved"&&!s.hidden&&!s.isPublic?`<span class="pill pill-hidden">${esc(t().statusPrivate)}</span>`:""}
          </div>
          <div class="dc-meta">
            ${s.members?`<span class="mi">👤 ${fmt(s.members)}</span>`:""}
            ${s.online?`<span class="mi">🟢 ${fmt(s.online)}</span>`:""}
            ${s.reviewCount?`<span class="mi">⭐ ${s.rating.toFixed(1)} (${s.reviewCount})</span>`:""}
          </div>
          <div class="dc-btns">
            ${live?`<button class="dc-view" data-go="/server/${esc(s.guildId)}">${esc(t().viewBtn)}</button>`:""}
            <button class="dc-edit" data-go="/edit/${esc(s.guildId)}">${esc(t().editBtn)}</button>
            ${!s.botAdded&&S.config.clientId?`<a class="dash-invite-btn" target="_blank" rel="noopener noreferrer" style="text-decoration:none"
              href="https://discord.com/oauth2/authorize?client_id=${esc(S.config.clientId)}&scope=bot%20applications.commands&permissions=1&guild_id=${esc(s.guildId)}">${esc(t().addBot)}</a>`:""}
          </div>
          ${!s.botAdded?`<div class="bot-warn"><span class="bw-ic">⚠️</span><span class="bw-tx"><b>${esc(t().addBot)}:</b> ${esc(t().botWarn)}</span></div>`:""}
          ${s.status==="pending"?`<div class="review-note"><span>🔎</span><span>${esc(t().reviewPending)}</span></div>`:""}
        </div>
        <div class="dc-bump">
          <button class="dc-bump-btn bumpbtn" data-id="${esc(s.guildId)}" data-at="${s.canBumpAt||0}">⬆</button>
          <div style="text-align:center">
            <div class="dc-clock" data-clock="${esc(s.guildId)}">00:00:00</div>
            <div class="dc-clock-sub">${esc(t().bumpCooldown)}</div>
          </div>
        </div>
      </div>`;
    }).join(""):`<div class="dash-empty">${esc(t().noUserServers)}</div>`;
    document.querySelectorAll(".bumpbtn").forEach(b=>{
      const clock=document.querySelector(`[data-clock="${b.dataset.id}"]`);
      const paint=()=>{
        const left=(+b.dataset.at)-Date.now();
        if(left>0){b.disabled=true;if(clock){clock.textContent=fmtClock(left);clock.classList.remove("ready");}}
        else{b.disabled=false;if(clock){clock.textContent="00:00:00";clock.classList.add("ready");}}
      };
      paint(); S.timers.push(setInterval(paint,1000));
      b.onclick=async()=>{
        try{const r=await api(`/api/servers/${b.dataset.id}/bump`,{method:"POST"});
          b.dataset.at=r.canBumpAt;toast(t().bumped,"ok");}
        catch(e){if(e.data&&e.data.canBumpAt)b.dataset.at=e.data.canBumpAt;}
      };
    });
  }catch{$("#mylist").innerHTML=`<div class="dash-empty">${esc(t().errNet)}</div>`;}
}

/* ── Vorschläge ── */
async function viewSug(){
  const app=$("#app");
  app.innerHTML=`<div class="page-wrap" style="max-width:760px">
    <button class="page-back" data-go="/">← ${esc(S.lang==="de"?"Zurück":"Back")}</button>
    <h1 class="page-title">${esc(t().sugTitle)}</h1>
    <p style="color:#8995ad;margin:-14px 0 28px;font-size:15px;text-align:center">${esc(t().sugSub)}</p>
    <div id="sugform"></div>
    <div class="sug-list" id="suglist"><div class="spin"></div></div></div>`;
  const form=$("#sugform");
  if(S.user){
    form.innerHTML=`<div style="margin-bottom:32px">
      <textarea class="desc-ta" id="sugtxt" maxlength="500" placeholder="${esc(t().sugPh)}" style="margin-bottom:12px"></textarea>
      <button class="save-btn" id="sugsend">${esc(t().sugSend)}</button></div>`;
    $("#sugsend").onclick=async()=>{
      const v=$("#sugtxt").value.trim(); if(v.length<4)return;
      $("#sugsend").disabled=true;
      try{await api("/api/suggestions",{method:"POST",body:{text:v}});toast(t().sugThanks,"ok");viewSug();}
      catch{toast(t().errNet,"err");$("#sugsend").disabled=false;}
    };
  } else {
    form.innerHTML=`<div class="infobox" style="margin-bottom:28px"><span class="infobox-ic">💡</span>
      <div>${esc(t().sugLogin)}</div></div>`;
  }
  try{
    const d=await api("/api/suggestions");
    const list=d.suggestions||[];
    $("#suglist").innerHTML=list.length?list.map(x=>`
      <div class="sug-item">
        <div class="sug-body"><p class="sug-text">${esc(x.text)}</p>
          <span class="sug-meta">${esc(t().sugBy)} ${esc(x.authorName)} · ${fmtAgo(x.createdAt)}</span></div>
        <div class="sug-actions">
          <button class="sug-vote" data-id="${x.id}" ${x.voted||!S.user?"disabled style='opacity:.55'":""}>▲ <span>${x.votes}</span></button>
          ${S.isAdmin?`<button class="del-btn sugdel" data-id="${x.id}" style="padding:6px 12px;font-size:12px">✕</button>`:""}
        </div></div>`).join("")
    :`<p style="color:#8995ad">${esc(t().sugEmpty)}</p>`;
    document.querySelectorAll(".sug-vote:not([disabled])").forEach(b=>b.onclick=async()=>{
      b.disabled=true;b.style.opacity=".55";
      b.querySelector("span").textContent=+b.querySelector("span").textContent+1;
      try{await api(`/api/suggestions/${b.dataset.id}/vote`,{method:"POST"});}catch{}
    });
    document.querySelectorAll(".sugdel").forEach(b=>b.onclick=async()=>{
      if(!(await confirmBox("Löschen?",t().deleteConfirm,"Löschen",true)))return;
      try{await api(`/api/suggestions/${b.dataset.id}`,{method:"DELETE"});viewSug();}catch{}
    });
  }catch{$("#suglist").innerHTML=`<p style="color:#8995ad">${esc(t().errNet)}</p>`;}
}

/* ── Admin ── */
let admTab="moderation";
async function viewAdmin(){
  const app=$("#app");
  if(!S.isAdmin)return go("/");
  app.innerHTML=`<div class="admin-wrap">
    <div class="admin-head"><h1>Admin</h1><span class="admin-badge">Control panel</span></div>
    <p class="admin-sub">Server, Meldungen und Einstellungen verwalten.</p>
    <div class="admin-statgrid" id="admstats"></div>
    <div class="admin-tabs" id="admtabs"></div>
    <div id="admbody"><div class="spin"></div></div></div>`;
  let servers=[],reports=[],settings={autoApprove:"0",requireBot:"0"};
  try{
    const [a,b,c]=await Promise.all([
      api("/api/admin/servers"),api("/api/admin/reports"),api("/api/admin/settings")]);
    servers=a.servers||[];reports=b.reports||[];settings=c.settings||settings;
  }catch{$("#admbody").innerHTML=`<div class="admin-empty"><div class="ae-ic">⚠️</div><p>${esc(t().errNet)}</p></div>`;return;}
  const pending=servers.filter(s=>s.status==="pending");
  const openReports=reports.filter(r=>!r.resolved);
  $("#admstats").innerHTML=`
    <div class="admin-stat"><div class="as-num">${servers.length}</div><div class="as-lbl">Server</div></div>
    <div class="admin-stat warn"><div class="as-num">${pending.length}</div><div class="as-lbl">In Prüfung</div></div>
    <div class="admin-stat"><div class="as-num">${servers.filter(s=>s.status==="approved"&&!s.hidden&&s.isPublic).length}</div><div class="as-lbl">Live</div></div>
    <div class="admin-stat warn"><div class="as-num">${openReports.length}</div><div class="as-lbl">Meldungen</div></div>
    <div class="admin-stat"><div class="as-num">${servers.filter(s=>s.featured).length}</div><div class="as-lbl">Featured</div></div>`;
  $("#admtabs").innerHTML=[["moderation","Moderation",pending.length,true],["servers","Alle Server",servers.length],["reports","Meldungen",openReports.length,true],["settings","Einstellungen"]]
    .map(([k,l,n,hot])=>`<button class="admin-tab ${admTab===k?"at-on":""}" data-tab="${k}">${l}${n?`<span class="at-count ${hot?"hot":""}">${n}</span>`:""}</button>`).join("");
  document.querySelectorAll("#admtabs [data-tab]").forEach(b=>b.onclick=()=>{admTab=b.dataset.tab;viewAdmin();});
  const body=$("#admbody");
  const act=async(gid,path)=>{try{await api(`/api/admin/servers/${gid}/${path}`,{method:"POST"});viewAdmin();}catch{toast(t().errNet,"err");}};
  const statusPill=s=>s.status==="pending"?'<span class="pill pill-review">In Prüfung</span>'
    :s.status==="rejected"?'<span class="pill pill-reject">Abgelehnt</span>'
    :s.hidden?'<span class="pill pill-hidden">Versteckt</span>'
    :'<span class="pill pill-active">Live</span>';
  const row=s=>`<div class="admin-card">
    ${iconHtml(s.icon,s.name,"ac-ic")}
    <div class="ac-main">
      <div class="ac-title">${esc(s.name)} ${s.featured?'<span class="feat-badge2">★ Featured</span>':""} ${statusPill(s)}</div>
      <div class="ac-meta"><span class="mono">${esc(s.guildId)}</span> · ${(s.tags||[]).slice(0,5).map(x=>"#"+esc(x)).join(" ")||"keine Tags"} · ⭐ ${s.rating?s.rating.toFixed(1):"–"} (${s.reviewCount||0}) · 👥 ${fmt(s.members)}</div>
      ${s.description?`<div class="ac-meta" style="margin-top:4px">${esc(s.description.slice(0,140))}</div>`:""}
    </div>
    <div class="ac-actions" data-gid="${esc(s.guildId)}">
      <button class="adm-btn" data-go="/server/${esc(s.guildId)}">Ansehen</button>
      ${s.status!=="approved"?`<button class="adm-btn ok" data-a="approve">Freigeben</button>`:""}
      ${s.status!=="rejected"?`<button class="adm-btn bad" data-a="reject">Ablehnen</button>`:""}
      ${admTab==="servers"?`
        ${s.status!=="pending"?`<button class="adm-btn" data-a="pending">In Prüfung</button>`:""}
        <button class="adm-btn" data-a="hide">${s.hidden?"Einblenden":"Verstecken"}</button>
        <button class="adm-btn gold ${s.featured?"on":""}" data-a="feature">★</button>
        <button class="adm-btn bad" data-a="del">Löschen</button>`:""}
    </div></div>`;
  if(admTab==="moderation"||admTab==="servers"){
    const list=admTab==="moderation"?pending:servers;
    body.innerHTML=list.length?list.map(row).join("")
      :`<div class="admin-empty"><div class="ae-ic">✅</div><p>${admTab==="moderation"?"Nichts zu prüfen.":"Noch keine Server."}</p></div>`;
    body.querySelectorAll(".ac-actions").forEach(box=>{
      const gid=box.dataset.gid;
      box.querySelectorAll("[data-a]").forEach(b=>b.onclick=async()=>{
        if(b.dataset.a==="del"){
          if(!(await confirmBox("Server löschen?",t().deleteConfirm,"Löschen",true)))return;
          try{await api(`/api/servers/${gid}`,{method:"DELETE"});viewAdmin();}catch{toast(t().errNet,"err");}
        } else act(gid,b.dataset.a);
      });
    });
  }
  if(admTab==="reports"){
    body.innerHTML=reports.length?reports.map(r=>`
      <div class="admin-row" style="${r.resolved?"opacity:.55":""}">
        <div class="ar-main">
          <div class="ar-name">🚩 ${esc(r.serverName)}</div>
          <div class="ar-sub">"${esc(r.reason)}" · ${fmtAgo(r.createdAt)}</div>
        </div>
        <div class="ac-actions">
          <button class="adm-btn" data-go="/server/${esc(r.guildId)}">Ansehen</button>
          <button class="adm-btn ok resbtn" data-id="${r.id}">${r.resolved?"Wieder öffnen":"Erledigt"}</button>
        </div></div>`).join("")
    :`<div class="admin-empty"><div class="ae-ic">🚩</div><p>Keine Meldungen.</p></div>`;
    body.querySelectorAll(".resbtn").forEach(b=>b.onclick=async()=>{
      try{await api(`/api/admin/reports/${b.dataset.id}/resolve`,{method:"POST"});viewAdmin();}catch{}
    });
  }
  if(admTab==="settings"){
    body.innerHTML=`<div class="admin-card" style="flex-direction:column;align-items:stretch;gap:0">
      <div class="admin-set-row">
        <div><div class="asr-label">Automatisch freigeben</div><div class="asr-desc">Neue Server überspringen die Prüfung.</div></div>
        <button class="toggle ${settings.autoApprove==="1"?"toggle-on":""}" data-k="autoApprove"><span class="toggle-knob"></span></button>
      </div>
      <div class="admin-set-row">
        <div><div class="asr-label">Bot-Pflicht</div><div class="asr-desc">Nur Server öffentlich listen, auf denen der Servify-Bot ist.</div></div>
        <button class="toggle ${settings.requireBot==="1"?"toggle-on":""}" data-k="requireBot"><span class="toggle-knob"></span></button>
      </div></div>`;
    body.querySelectorAll(".toggle").forEach(sw=>sw.onclick=async()=>{
      sw.classList.toggle("toggle-on");
      try{await api("/api/admin/settings",{method:"POST",body:{[sw.dataset.k]:sw.classList.contains("toggle-on")}});toast(t().savedToast,"ok");}
      catch{toast(t().errNet,"err");sw.classList.toggle("toggle-on");}
    });
  }
}

/* ── Rendern & Start ── */
function render(){
  clearTimers();
  document.title="Servify – Entdecke Discord Server";
  renderNav(); renderFooter();
  const r=route();
  if(r.v==="detail")return viewDetail(r.id);
  if(r.v==="edit")  return viewEdit(r.id);
  if(r.v==="add")   return viewAdd();
  if(r.v==="dash")  return viewDash();
  if(r.v==="sug")   return viewSug();
  if(r.v==="admin") return viewAdmin();
  return viewBrowse();
}
(async function boot(){
  try{
    const [cfg,me]=await Promise.all([api("/api/config").catch(()=>null),api("/api/me").catch(()=>null)]);
    if(cfg)S.config=cfg;
    if(me){S.user=me.user;S.isAdmin=me.isAdmin;}
  }catch{}
  const sp=new URLSearchParams(location.search);
  if(sp.get("fehler")==="login"){
    toast(t().loginFail,"err");
    sp.delete("fehler");
    history.replaceState({},"",location.pathname+(sp.toString()?`?${sp}`:""));
  }
  render();
})();

</script>
